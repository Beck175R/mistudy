<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests">
  <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=()">
  <title>Mystery Study Quest</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="noise"></div>
  <main class="app">
    <header class="header">
      <div>
        <p class="kicker">CASE FILE 01</p>
        <h1>止まった時計塔と消えた星のペンダント</h1>
        <p id="storyBeat" class="story-line">時計塔の鐘は止まり、町はざわついている。最初の3問で現場の空気を読もう。</p>
      </div>
      <div class="header-stats">
        <article class="stat-card">
          <span>ひらめき</span>
          <strong id="sparkValue">0</strong>
        </article>
        <article class="stat-card">
          <span>手がかり</span>
          <strong id="clueValue">0 / 4</strong>
        </article>
        <article class="stat-card">
          <span>ランク</span>
          <strong id="rankValue">見習い探偵</strong>
        </article>
      </div>
    </header>

    <section class="top-strip">
      <div class="meter-panel">
        <div class="meter-label-row">
          <span>事件の解像度</span>
          <strong id="progressBadge">0%</strong>
        </div>
        <div class="meter-track">
          <div id="mysteryMeter" class="meter-fill"></div>
        </div>
        <p id="nextReward" class="subtle">次の手がかりまであと3問</p>
      </div>

      <div class="mini-panel">
        <span>進行章</span>
        <div id="chapterTimeline" class="chapter-pills"></div>
      </div>

      <div class="mini-panel">
        <span>探偵バッジ</span>
        <div id="achievementList" class="achievement-pills"></div>
      </div>
    </section>

    <section class="workspace">
      <aside class="left-panel panel">
        <div class="panel-head">
          <h2>容疑者</h2>
          <span class="badge">4人</span>
        </div>
        <div id="suspectList" class="suspect-list"></div>
      </aside>

      <section class="center-panel panel">
        <div class="panel-head">
          <div>
            <p class="kicker">INVESTIGATION</p>
            <h2 id="missionTitle">ミッションを準備中...</h2>
          </div>
          <div class="mission-head-right">
            <span id="missionSubject" class="badge accent">算数</span>
            <button id="changeMissionButton" class="ghost-button">別の問題</button>
          </div>
        </div>

        <p id="missionStory" class="mission-copy"></p>

        <div class="mission-progress">
          <div class="meter-label-row">
            <span>今回の調査セット</span>
            <strong id="cycleLabel">0 / 3 問</strong>
          </div>
          <div class="meter-track compact">
            <div id="cycleMeter" class="meter-fill"></div>
          </div>
        </div>

        <div id="questionCard" class="question-card"></div>
        <div id="feedbackCard" class="feedback-card hidden" aria-live="polite"></div>

        <div class="button-row">
          <button id="submitAnswerButton" class="primary-button">回答する</button>
          <button id="nextQuestionButton" class="secondary-button hidden">次の問題へ</button>
        </div>

        <div class="bottom-status">
          <article class="status-box">
            <span>調査メモ</span>
            <p id="liveHint">時計塔の近くで見つかった小さな違和感を集めよう。</p>
          </article>
          <article class="status-box narrow">
            <span>連続正解</span>
            <strong id="streakValue">0</strong>
          </article>
        </div>
      </section>

      <aside class="right-panel">
        <article class="panel clue-panel">
          <div class="panel-head">
            <h2>手がかり</h2>
            <span id="clueBoardBadge" class="badge">0 / 4</span>
          </div>
          <div id="clueBoard" class="clue-board"></div>
        </article>

        <article class="panel solve-panel">
          <div class="panel-head">
            <h2>最終推理</h2>
            <span id="deductionLock" class="lock-pill">手がかりを4つ集めると解放</span>
          </div>
          <div class="form-stack">
            <label class="field">
              <span>犯人</span>
              <select id="culpritSelect"></select>
            </label>
            <label class="field">
              <span>本当の時刻</span>
              <select id="timeSelect"></select>
            </label>
            <label class="field">
              <span>隠し場所</span>
              <select id="placeSelect"></select>
            </label>
          </div>
          <button id="solveCaseButton" class="primary-button wide">事件を解決する</button>
          <div id="solutionCard" class="solution-card hidden" aria-live="polite"></div>
        </article>
      </aside>
    </section>
  </main>

  <div id="celebrationModal" class="celebration-modal hidden" aria-live="polite">
    <div class="celebration-card">
      <p class="kicker">CLUE UNLOCKED</p>
      <h2 id="celebrationTitle">新しい手がかりを発見</h2>
      <p id="celebrationBody"></p>
      <button id="closeCelebrationButton" class="primary-button">続ける</button>
    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
