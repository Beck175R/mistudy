<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests">
  <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=()">
  <title>Mystery Study Quest</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="background-layer">
    <div class="fog fog-a"></div>
    <div class="fog fog-b"></div>
    <div class="glow glow-a"></div>
    <div class="glow glow-b"></div>
  </div>

  <main class="casefile">
    <header class="topbar">
      <div>
        <p class="eyebrow">Case File 01</p>
        <h1>止まった時計塔と消えた星のペンダント</h1>
      </div>
      <div class="topbar-status">
        <div class="status-pill">
          <span>ひらめき</span>
          <strong id="sparkValue">0</strong>
        </div>
        <div class="status-pill">
          <span>手がかり</span>
          <strong id="clueValue">0 / 4</strong>
        </div>
        <div class="status-pill">
          <span>ランク</span>
          <strong id="rankValue">見習い探偵</strong>
        </div>
      </div>
    </header>

    <section class="case-summary-bar">
      <div class="summary-copy">
        <p id="storyBeat">時計塔の鐘は止まり、町はざわついている。最初の3問で現場の空気を読もう。</p>
      </div>
      <div class="progress-cluster">
        <span id="progressBadge" class="badge">0%</span>
        <div class="meter-track">
          <div id="mysteryMeter" class="meter-fill"></div>
        </div>
        <small id="nextReward">次の手がかりまであと3問</small>
      </div>
    </section>

    <section class="workspace">
      <aside class="left-rail">
        <article class="panel board-panel">
          <div class="panel-head">
            <h2>容疑者ボード</h2>
            <span class="mini-badge">4人</span>
          </div>
          <div id="suspectList" class="suspect-list compact"></div>
        </article>

        <article class="panel board-panel">
          <div class="panel-head">
            <h2>進行章</h2>
            <span class="mini-badge">4章</span>
          </div>
          <div id="chapterTimeline" class="chapter-timeline compact"></div>
        </article>
      </aside>

      <section class="center-stage">
        <article class="panel main-panel">
          <div class="main-panel-head">
            <div>
              <p class="eyebrow">Investigation</p>
              <h2 id="missionTitle">ミッションを準備中...</h2>
            </div>
            <div class="main-panel-meta">
              <span id="missionSubject" class="subject-badge">算数</span>
              <button id="changeMissionButton" class="ghost-button">別の問題</button>
            </div>
          </div>

          <p id="missionStory" class="mission-story"></p>

          <div class="mission-progress">
            <div class="mission-progress-copy">
              <span>今回の調査セット</span>
              <strong id="cycleLabel">0 / 3 問</strong>
            </div>
            <div class="meter-track compact">
              <div id="cycleMeter" class="meter-fill"></div>
            </div>
          </div>

          <div id="questionCard" class="question-card"></div>
          <div id="feedbackCard" class="feedback-card hidden" aria-live="polite"></div>

          <div class="action-row">
            <button id="submitAnswerButton" class="primary-button">回答する</button>
            <button id="nextQuestionButton" class="secondary-button hidden">次の問題へ</button>
          </div>
        </article>

        <article class="panel footer-strip">
          <div class="footer-note">
            <span>調査メモ</span>
            <p id="liveHint">時計塔の近くで見つかった小さな違和感を集めよう。</p>
          </div>
          <div class="footer-note">
            <span>連続正解</span>
            <strong id="streakValue">0</strong>
          </div>
          <div class="footer-note">
            <span>探偵バッジ</span>
            <div id="achievementList" class="achievement-list compact"></div>
          </div>
        </article>
      </section>

      <aside class="right-rail">
        <article class="panel board-panel">
          <div class="panel-head">
            <h2>手がかりボード</h2>
            <span id="clueBoardBadge" class="mini-badge">0 / 4</span>
          </div>
          <div id="clueBoard" class="clue-board-grid compact"></div>
        </article>

        <article class="panel board-panel deduction-panel">
          <div class="panel-head">
            <h2>最終推理</h2>
            <span id="deductionLock" class="lock-label">手がかりを4つ集めると解放</span>
          </div>
          <div class="form-stack compact-form">
            <label class="select-block">
              <span>犯人</span>
              <select id="culpritSelect"></select>
            </label>
            <label class="select-block">
              <span>本当の時刻</span>
              <select id="timeSelect"></select>
            </label>
            <label class="select-block">
              <span>隠し場所</span>
              <select id="placeSelect"></select>
            </label>
          </div>
          <button id="solveCaseButton" class="primary-button full-width">事件を解決する</button>
          <div id="solutionCard" class="solution-card hidden" aria-live="polite"></div>
        </article>
      </aside>
    </section>
  </main>

  <div id="celebrationModal" class="celebration-modal hidden" aria-live="polite">
    <div class="celebration-card">
      <p class="eyebrow">Clue Unlocked</p>
      <h2 id="celebrationTitle">新しい手がかりを発見</h2>
      <p id="celebrationBody"></p>
      <button id="closeCelebrationButton" class="primary-button">調査を続ける</button>
    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
